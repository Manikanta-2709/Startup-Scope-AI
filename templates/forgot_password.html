{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<section class="page-shell narrow-page">
    <div class="page-card glass reveal">
        <h1>Change your password</h1>
        <p class="page-lead">Enter your account email and choose a new password directly on this page.</p>

        <form id="forgot-password-form">
            <div class="form-group">
                <label for="forgot-email">Email Address</label>
                <input type="email" id="forgot-email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="forgot-new-password">New Password</label>
                <input type="password" id="forgot-new-password" placeholder="Minimum 8 characters" required>
            </div>
            <div class="form-group">
                <label for="forgot-confirm-password">Confirm New Password</label>
                <input type="password" id="forgot-confirm-password" placeholder="Repeat your new password" required>
            </div>
            <p id="forgot-password-status" class="form-status hidden"></p>
            <button type="submit" class="glow-button" style="width: 100%;">Change Password</button>
        </form>
    </div>
</section>
{% endblock %}
