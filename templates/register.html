{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="auth-modal glass reveal" style="position: static; max-width: 450px;">
        <h2 style="text-align: center; margin-bottom: 35px; font-weight: 800; letter-spacing: -1px;">Create Account</h2>
        <div id="onboarding-idea-banner" class="inline-banner hidden"></div>
        <form id="standalone-register-form">
            <input type="hidden" id="auth-idea">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="auth-name" required placeholder="John Doe">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Email Address</label>
                <input type="email" id="auth-email" required placeholder="name@company.com">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Password</label>
                <input type="password" id="auth-password" required placeholder="••••••••">
            </div>
            <p id="auth-error" class="error-msg hidden"></p>
            <button type="submit" id="auth-submit-btn" class="glow-button" style="width: 100%; margin-top: 25px;">Start Your Journey</button>
        </form>
        <p class="auth-switch" style="margin-top: 30px;">
            Already have an account? 
            <a id="register-to-login-link" href="/login-page">Login instead</a>
        </p>
    </div>
</div>
{% endblock %}
